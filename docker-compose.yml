services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_monitor_db
    environment:
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_pass
      POSTGRES_DB: smart_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_user -d smart_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_monitor_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://smart_user:smart_pass@postgres:5432/smart_monitor
      DATABASE_SYNC_URL: postgresql://smart_user:smart_pass@postgres:5432/smart_monitor
      SECRET_KEY: your-super-secret-jwt-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      # ─────────────────────────────────────────────────────────
      # MODE SIMULATION  →  SIMULATION_MODE=true  (données fictives)
      # MODE PRODUCTION  →  SIMULATION_MODE=false (données CSV réels)
      # ─────────────────────────────────────────────────────────
      SIMULATION_MODE: "true"
      # Chemin où le backend lit les fichiers CSV.
      # En mode local  : /app/csv_data  (volume Docker ci-dessous)
      # En mode NAS    : /mnt/nas_data  (voir guide docs/GUIDE_PRODUCTION.md)
      CSV_DATA_PATH: /app/csv_data
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    volumes:
      - ./backend:/app
      - csv_data:/app/csv_data
      # Décommentez la ligne suivante quand le NAS est monté sur l'hôte :
      # - /mnt/nas_data:/app/csv_data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: smart_monitor_frontend
    environment:
      # URL relative = le proxy Vite achemine vers le backend (réseau Docker)
      VITE_API_URL: ""
      VITE_WS_URL: ""
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - smart_net
    restart: unless-stopped

volumes:
  postgres_data:
  csv_data:

networks:
  smart_net:
    driver: bridge
